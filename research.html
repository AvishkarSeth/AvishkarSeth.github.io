<section id="research">
<div class="container">

<div id="papers"></div>

</div>

<script>

async function loadPapers(){

  try{

    const response = await fetch("data/papers.json")
    const papers = await response.json()

    papers.sort((a,b)=>b.year-a.year)

    let html=""
    let currentYear=""

    papers.forEach(p=>{

      if(p.year !== currentYear){

        if(currentYear !== "") html += "</div>"

        currentYear = p.year

        html += `
        <hr>
        <h2 style="text-align:center">${p.year}</h2>
        <hr>
        <div class="row">
        `
      }

      html += `
      <div class="col-lg-4 col-md-6 d-flex align-items-stretch mt-4">

        <div class="icon-box">

          <a href="${p.link}" target="_blank">

            <img class="img-fluid"
            src="${p.image}"
            style="padding-bottom:15px;border-radius:12px;">

            <h4>${p.title}</h4>

            <p style="font-size:14px;color:#555;">
            ${p.authors}<br>
            <i>${p.venue}</i>
            </p>

            <div style="margin-top:10px;font-weight:bold;color:#007bff;">
              <i class="icofont-globe"></i> View Paper
            </div>

          </a>

        </div>

      </div>
      `
    })

    html += "</div>"

    document.getElementById("papers").innerHTML = html

  }

  catch(err){

    console.error("Error loading papers:",err)

  }

}

loadPapers()

</script>
